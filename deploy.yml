name: Deploy AttendPro HRMS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint & Test ─────────────────────────────────────────────────────────
  test:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyflakes

      - name: Syntax check all Python files
        run: |
          echo "=== Checking Python syntax ==="
          python -m pyflakes config.py database.py main.py
          python -m pyflakes models/
          python -m pyflakes schemas/
          python -m pyflakes services/
          python -m pyflakes routes/
          python -m pyflakes templates/
          echo "=== All files OK ==="

      - name: Verify app imports correctly
        run: |
          python -c "
          import sys, os
          os.environ['DATABASE_URL'] = 'postgresql://test:test@localhost/test'
          os.environ['SECRET_KEY']   = 'test-secret'
          # Verify all modules import without errors
          import config, database
          print('✅ config, database — OK')
          import models
          print('✅ models — OK')
          import schemas
          print('✅ schemas — OK')
          print('✅ All imports successful')
          "

  # ── 2. Deploy to Render ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render Deploy Hook
        # Add RENDER_DEPLOY_HOOK_URL as a GitHub Secret
        # (Settings → Secrets → Actions → New repository secret)
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Triggering Render deployment..."
            curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
              -H "Content-Type: application/json" \
              --fail \
              && echo "✅ Render deploy triggered successfully" \
              || echo "⚠️  Deploy hook call failed"
          else
            echo "ℹ️  RENDER_DEPLOY_HOOK_URL secret not set — skipping auto-deploy"
            echo "    See README.md for setup instructions"
          fi

      - name: Deployment summary
        run: |
          echo "================================================"
          echo "  AttendPro HRMS — Deployment Summary"
          echo "================================================"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Trigger : ${{ github.event_name }}"
          echo "  Time    : $(date -u)"
          echo "================================================"
